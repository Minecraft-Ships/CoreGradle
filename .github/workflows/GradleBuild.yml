name: Gradle Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  testShips:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'adopt'
      - name: Run all tests
        run: ./gradlew test
      - name: Clean
        run: ./gradlew clean
      - name: Run translate core
        run: './gradlew :ShipsForCore:build'
      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: "Ships For Core"
          path: "ShipsForCore/build/libs/*.jar"
  buildTranslateFolia:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
      - name: Set up JDK 25
        uses: actions/setup-java@v3
        with:
          java-version: '25'
          distribution: 'adopt'
      - name: Build Folia with Gradle
        run: ./gradlew buildPaper
      - uses: actions/upload-artifact@v3
        with:
          name: "TranslateCore-Folia-And-Paper"
          path: "standalone/ShipsFolia.jar"
  buildStandAloneFolia:
    needs: [ buildTranslateFolia, testShips ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'adopt'
      - name: Build Folia with Gradle
        run: ./gradlew buildPaper
      - uses: actions/upload-artifact@v3
        with:
          name: "Standalone-Ships-Folia-And-Paper"
          path: "standalone/ShipsFolia.jar"